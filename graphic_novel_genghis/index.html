<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genghis Khan: The Blue Wolf — A Complete Graphic Novel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a14;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 1rem;
      background: #0a1426;
      border-bottom: 1px solid #1a2a4a;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 0.95rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #5b9bd5, #c0392b, #5b9bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .back-link {
      color: #5b9bd5;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 1px;
      opacity: 0.75;
    }
    .back-link:hover { opacity: 1; }

    .page-label-top {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .reader {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      min-height: 0;
      overflow: hidden;
    }

    .page-container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      display: none;
      height: 100%;
      animation: fadeIn 0.4s ease;
    }

    .page.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page img {
      max-height: 100%;
      max-width: 100%;
      height: auto;
      width: auto;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
      cursor: pointer;
      object-fit: contain;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.4rem 1rem;
      background: #0a1426;
      border-top: 1px solid #1a2a4a;
      flex-shrink: 0;
    }

    .btn {
      background: #0f1d36;
      border: 1px solid #1f3560;
      color: #bbb;
      padding: 0.35rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn:hover:not(:disabled) {
      background: #1a2a4a;
      border-color: #c0392b;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-arrow {
      font-size: 1.2rem;
    }

    .page-indicator {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1a2a4a;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #c0392b;
      box-shadow: 0 0 8px rgba(192, 57, 43, 0.6);
      transform: scale(1.2);
    }

    .dot:hover:not(.active) {
      background: #2a4070;
    }

    .page-num {
      font-size: 0.8rem;
      color: #777;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.97);
      z-index: 100;
      cursor: zoom-out;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .fullscreen-overlay.active {
      display: flex;
    }

    .fullscreen-overlay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .fullscreen-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 0.8rem;
      z-index: 101;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 0.8rem; }
      .btn { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
      .controls { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="../index.html" class="back-link">&larr; Back</a>
    <h1>Genghis Khan: The Blue Wolf</h1>
    <span class="page-label-top" id="pageLabelTop"></span>
  </div>

  <div class="reader">
    <div class="page-container" id="pageContainer"></div>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn" onclick="navigate(-1)">
      <span class="btn-arrow">&larr;</span> Prev
    </button>
    <div class="page-indicator" id="dots"></div>
    <span class="page-num" id="pageNum"></span>
    <button class="btn" id="nextBtn" onclick="navigate(1)">
      Next <span class="btn-arrow">&rarr;</span>
    </button>
  </div>

  <div class="fullscreen-overlay" id="fullscreen" onclick="closeFullscreen()">
    <img id="fullscreenImg" src="" alt="">
    <div class="fullscreen-hint">Click anywhere to close</div>
  </div>

  <script>
    const pages = [
      { src: 'cover.png', label: 'Cover' },
      { src: 'page1.png', label: 'Page 1 — The Frozen River' },
      { src: 'page2.png', label: 'Page 2 — The Betrothal' },
      { src: 'page3.png', label: 'Page 3 — The Poisoning' },
      { src: 'page4.png', label: 'Page 4 — Wolves Do Not Die Easy' },
      { src: 'page5.png', label: 'Page 5 — The Fish' },
      { src: 'page6.png', label: 'Page 6 — A Piece of Your Own Liver' },
      { src: 'page7.png', label: 'Page 7 — The Cangue' },
      { src: 'page8.png', label: 'Page 8 — She Chose Me Anyway' },
      { src: 'page9.png', label: 'Page 9 — The Merkit Came at Dawn' },
      { src: 'page10.png', label: 'Page 10 — The Anda Oath' },
      { src: 'page11.png', label: 'Page 11 — He Is Mine' },
      { src: 'page12.png', label: 'Page 12 — Twenty-Three Years Old' },
      { src: 'page13.png', label: 'Page 13 — Two Suns in One Sky' },
      { src: 'page14.png', label: 'Page 14 — The Cauldrons' },
      { src: 'page15.png', label: 'Page 15 — The Arrow' },
      { src: 'page16.png', label: 'Page 16 — Jebe' },
      { src: 'page17.png', label: 'Page 17 — A Bloodless Death' },
      { src: 'page18.png', label: 'Page 18 — Genghis Khan' },
      { src: 'page19.png', label: 'Page 19 — Easy to Conquer' },
      { src: 'page20.png', label: 'Page 20 — The Heads in a Sack' },
      { src: 'page21.png', label: 'Page 21 — The Punishment of God' },
      { src: 'page22.png', label: 'Page 22 — Bukhara' },
      { src: 'page23.png', label: 'Page 23 — The Sons' },
      { src: 'page24.png', label: 'Page 24 — The Fall' },
      { src: 'page25.png', label: 'Page 25 — Changchun' },
      { src: 'page26.png', label: 'Page 26 — Last Words' },
      { src: 'page27.png', label: 'Page 27 — The Secret Burial' },
      { src: 'page28.png', label: 'Page 28 — The Wind Remembers' },
    ];

    let current = 0;

    function init() {
      const container = document.getElementById('pageContainer');
      const dots = document.getElementById('dots');

      pages.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'page' + (i === 0 ? ' active' : '');
        div.innerHTML = `<img src="${p.src}" alt="${p.label}" onclick="openFullscreen('${p.src}')" />`;
        container.appendChild(div);

        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goTo(i);
        dots.appendChild(dot);
      });

      updateUI();
    }

    function goTo(index) {
      if (index < 0 || index >= pages.length) return;
      current = index;
      updateUI();
    }

    function navigate(dir) {
      goTo(current + dir);
    }

    function updateUI() {
      document.querySelectorAll('.page').forEach((p, i) => {
        p.classList.toggle('active', i === current);
      });
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === pages.length - 1;
      document.getElementById('pageNum').textContent =
        `${current + 1} / ${pages.length}`;
      document.getElementById('pageLabelTop').textContent = pages[current].label;
    }

    function openFullscreen(src) {
      const overlay = document.getElementById('fullscreen');
      document.getElementById('fullscreenImg').src = src;
      overlay.classList.add('active');
    }

    function closeFullscreen() {
      document.getElementById('fullscreen').classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'Escape') closeFullscreen();
    });

    init();
  </script>
</body>
</html>
