<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstein & Spider-Strike: Rise of the Master - Issue #3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: linear-gradient(180deg, #2e0a0a 0%, #0a0000 100%);
      border-bottom: 2px solid #3a1010;
    }

    .header h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ef4444, #dc2626, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #777;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .header .issue-badge {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.2rem 0.8rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #dc2626;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #ef4444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .reader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      min-height: calc(100vh - 200px);
    }

    .page-container {
      position: relative;
      max-width: 900px;
      width: 100%;
    }

    .page {
      display: none;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    .page.active {
      display: block;
    }

    .page img {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8), 0 0 80px rgba(220, 38, 38, 0.2);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .page img:hover {
      transform: scale(1.01);
    }

    .page-label {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.5rem;
      background: linear-gradient(0deg, #2e0a0a 0%, #0a0000 100%);
      border-top: 1px solid #3a1010;
      position: sticky;
      bottom: 0;
    }

    .btn {
      background: #2a0e0e;
      border: 1px solid #5a1a1a;
      color: #bbb;
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover:not(:disabled) {
      background: #4a1a1a;
      border-color: #dc2626;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-arrow {
      font-size: 1.2rem;
    }

    .page-indicator {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a1010;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
      transform: scale(1.2);
    }

    .dot:hover:not(.active) {
      background: #6a2020;
    }

    .page-num {
      font-size: 0.9rem;
      color: #777;
      min-width: 80px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .thumbnails {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      padding: 1rem;
      overflow-x: auto;
      max-width: 900px;
      margin: 0 auto;
    }

    .thumb {
      width: 100px;
      min-width: 100px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.4;
      transition: all 0.3s ease;
    }

    .thumb.active {
      border-color: #ef4444;
      opacity: 1;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
    }

    .thumb:hover:not(.active) {
      opacity: 0.7;
      border-color: #6a2020;
    }

    .thumb img {
      width: 100%;
      display: block;
    }

    .fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.97);
      z-index: 100;
      cursor: zoom-out;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .fullscreen-overlay.active {
      display: flex;
    }

    .fullscreen-overlay img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .fullscreen-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 0.8rem;
      z-index: 101;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.2rem; }
      .btn { padding: 0.6rem 1rem; font-size: 0.85rem; }
      .thumb { width: 70px; min-width: 70px; }
      .controls { gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Einstein & Spider-Strike</h1>
    <p>Rise of the Master</p>
    <span class="issue-badge">Issue #3</span>
  </div>

  <div class="thumbnails" id="thumbnails"></div>

  <div class="reader">
    <div class="page-container" id="pageContainer"></div>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn" onclick="navigate(-1)">
      <span class="btn-arrow">&larr;</span> Prev
    </button>
    <div class="page-indicator" id="dots"></div>
    <span class="page-num" id="pageNum"></span>
    <button class="btn" id="nextBtn" onclick="navigate(1)">
      Next <span class="btn-arrow">&rarr;</span>
    </button>
  </div>

  <div class="fullscreen-overlay" id="fullscreen" onclick="closeFullscreen()">
    <img id="fullscreenImg" src="" alt="">
    <div class="fullscreen-hint">Click anywhere to close</div>
  </div>

  <script>
    const pages = [
      { src: 'cover.png', label: 'Cover' },
      { src: 'p3_page1.png', label: 'Page 1 — The Aftermath' },
      { src: 'p3_page2.png', label: 'Page 2 — The Master Arrives' },
      { src: 'p3_page3.png', label: 'Page 3 — Outmatched' },
      { src: 'p3_page4.png', label: 'Page 4 — The Weakness' },
      { src: 'p3_page5.png', label: 'Page 5 — The Counterattack' },
      { src: 'p3_page6.png', label: 'Page 6 — KRAAASH!' },
    ];

    let current = 0;

    function init() {
      const container = document.getElementById('pageContainer');
      const thumbs = document.getElementById('thumbnails');
      const dots = document.getElementById('dots');

      pages.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'page' + (i === 0 ? ' active' : '');
        div.innerHTML = `
          <img src="${p.src}" alt="${p.label}" onclick="openFullscreen('${p.src}')" />
          <div class="page-label">${p.label}</div>
        `;
        container.appendChild(div);

        const thumb = document.createElement('div');
        thumb.className = 'thumb' + (i === 0 ? ' active' : '');
        thumb.innerHTML = `<img src="${p.src}" alt="${p.label}">`;
        thumb.onclick = () => goTo(i);
        thumbs.appendChild(thumb);

        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goTo(i);
        dots.appendChild(dot);
      });

      updateUI();
    }

    function goTo(index) {
      if (index < 0 || index >= pages.length) return;
      current = index;
      updateUI();
    }

    function navigate(dir) {
      goTo(current + dir);
    }

    function updateUI() {
      document.querySelectorAll('.page').forEach((p, i) => {
        p.classList.toggle('active', i === current);
      });
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === current);
      });
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === pages.length - 1;
      document.getElementById('pageNum').textContent =
        `${current + 1} / ${pages.length}`;

      const activeTh = document.querySelectorAll('.thumb')[current];
      if (activeTh) activeTh.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function openFullscreen(src) {
      const overlay = document.getElementById('fullscreen');
      document.getElementById('fullscreenImg').src = src;
      overlay.classList.add('active');
    }

    function closeFullscreen() {
      document.getElementById('fullscreen').classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'Escape') closeFullscreen();
    });

    init();
  </script>
</body>
</html>
