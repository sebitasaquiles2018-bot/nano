<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost of Tsushima - Jin Sakai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Noto Serif JP', serif; }
canvas { cursor: crosshair; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; display: flex; flex-direction: column; align-items: center;
}
#hud {
  display: flex; justify-content: space-between; width: 800px; padding: 10px 20px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  color: #e8d5b0; font-size: 14px; letter-spacing: 1px;
}
.hud-section { display: flex; flex-direction: column; gap: 4px; }
.health-bar-bg { width: 200px; height: 12px; background: #333; border: 1px solid #555; border-radius: 2px; }
.health-bar { height: 100%; background: linear-gradient(90deg, #8b0000, #cc0000); border-radius: 1px; transition: width 0.3s; }
.resolve-bar { height: 100%; background: linear-gradient(90deg, #b8860b, #ffd700); border-radius: 1px; transition: width 0.3s; }
#screen-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  color: #e8d5b0; pointer-events: auto; z-index: 10;
}
#screen-overlay h1 { font-size: 62px; letter-spacing: 12px; margin-bottom: 0; text-transform: uppercase; font-weight: 900;
  text-shadow: 0 0 40px rgba(200,50,0,0.6), 0 0 80px rgba(200,50,0,0.3), 0 4px 8px rgba(0,0,0,0.8); }
#screen-overlay h2 { font-size: 22px; letter-spacing: 8px; margin-bottom: 6px; color: #c4a060; font-weight: 400;
  text-shadow: 0 0 20px rgba(196,160,96,0.4); }
#screen-overlay .subtitle { font-size: 14px; color: #888; margin-bottom: 35px; letter-spacing: 3px; font-style: italic; }
#screen-overlay .jp-text { font-size: 28px; color: rgba(200,50,0,0.3); letter-spacing: 16px; margin-bottom: 20px; }
#screen-overlay button {
  padding: 14px 50px; font-size: 16px; letter-spacing: 4px; cursor: pointer;
  background: rgba(200,50,0,0.15); color: #e8d5b0; border: 1px solid rgba(200,160,80,0.5);
  transition: all 0.4s; text-transform: uppercase; pointer-events: auto; font-family: 'Noto Serif JP', serif;
}
#screen-overlay button:hover { background: rgba(200,50,0,0.4); border-color: #e8d5b0; box-shadow: 0 0 30px rgba(200,50,0,0.3); }
.controls { font-size: 12px; color: #666; margin-top: 25px; text-align: center; line-height: 2; letter-spacing: 1px; }
.wave-announce {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 36px; color: #e8d5b0; letter-spacing: 8px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.5s; pointer-events: none;
  text-shadow: 0 0 30px rgba(200,50,0,0.5), 0 0 60px rgba(0,0,0,0.8);
}
.wave-announce.show { opacity: 1; }
#combo-display {
  position: absolute; top: 120px; right: calc(50% - 380px);
  font-size: 28px; color: #ffd700; letter-spacing: 2px; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
#combo-display.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="ui-overlay">
  <div id="hud" style="display:none;">
    <div class="hud-section">
      <span>JIN SAKAI</span>
      <div class="health-bar-bg"><div class="health-bar" id="health-bar" style="width:100%"></div></div>
    </div>
    <div class="hud-section" style="text-align:center;">
      <span id="wave-text">WAVE 1 / 10</span>
      <span id="enemy-count" style="font-size:12px; color:#888;">Enemies: 0</span>
    </div>
    <div class="hud-section" style="text-align:right;">
      <span>RESOLVE</span>
      <div class="health-bar-bg"><div class="resolve-bar" id="resolve-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="wave-announce" id="wave-announce"></div>
  <div id="combo-display"></div>
</div>

<div id="screen-overlay">
  <div class="jp-text"></div>
  <h1>GHOST</h1>
  <h2>Jin Sakai</h2>
  <div class="subtitle">Defend Tsushima against the Ronin horde</div>
  <button id="start-btn">BEGIN</button>
  <div class="controls">
    WASD / Arrows — Move &nbsp;&nbsp;|&nbsp;&nbsp; Left Click — Light Attack &nbsp;&nbsp;|&nbsp;&nbsp; Right Click — Heavy Attack<br>
    SPACE — Dash &nbsp;&nbsp;|&nbsp;&nbsp; Q — Heal (requires Resolve) &nbsp;&nbsp;|&nbsp;&nbsp; Survive 20 waves to win
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// ===== ENVIRONMENT OBJECTS (pre-generated) =====
const grassBlades = [];
for (let i = 0; i < 300; i++) {
  grassBlades.push({
    x: Math.random() * W, y: Math.random() * H,
    h: 6 + Math.random() * 10, phase: Math.random() * Math.PI * 2,
    color: `rgba(${30+Math.random()*40},${50+Math.random()*50},${15+Math.random()*25},${0.3+Math.random()*0.4})`
  });
}

const leaves = [];
for (let i = 0; i < 25; i++) {
  leaves.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: 15 + Math.random() * 30, vy: 10 + Math.random() * 20,
    rot: Math.random() * Math.PI * 2, rotSpd: 1 + Math.random() * 3,
    size: 3 + Math.random() * 4,
    color: Math.random() < 0.6 ? '#cc3322' : (Math.random() < 0.5 ? '#dd7733' : '#ffaa44'),
    wobble: Math.random() * Math.PI * 2, wobbleSpd: 2 + Math.random() * 2
  });
}

const fireflies = [];
for (let i = 0; i < 15; i++) {
  fireflies.push({
    x: Math.random() * W, y: Math.random() * H,
    phase: Math.random() * Math.PI * 2,
    driftX: Math.random() * Math.PI * 2, driftY: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.5
  });
}

// Rocks and trees for background
const rocks = [];
for (let i = 0; i < 8; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 280 + Math.random() * 100;
  rocks.push({
    x: W/2 + Math.cos(angle) * dist,
    y: H/2 + Math.sin(angle) * dist * 0.7,
    w: 15 + Math.random() * 25,
    h: 10 + Math.random() * 15
  });
}

const trees = [];
for (let i = 0; i < 5; i++) {
  const side = Math.floor(Math.random() * 4);
  let tx, ty;
  if (side === 0) { tx = Math.random() * 100; ty = Math.random() * H; }
  else if (side === 1) { tx = W - Math.random() * 100; ty = Math.random() * H; }
  else if (side === 2) { tx = Math.random() * W; ty = Math.random() * 80; }
  else { tx = Math.random() * W; ty = H - Math.random() * 60; }
  trees.push({ x: tx, y: ty, trunkH: 40 + Math.random() * 30, canopyR: 25 + Math.random() * 20 });
}

// Title screen background rendering
let titleTime = 0;
function drawTitleBG(t) {
  titleTime += 0.016;
  // Night sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0a0a1a');
  skyGrad.addColorStop(0.3, '#1a1028');
  skyGrad.addColorStop(0.6, '#1a1520');
  skyGrad.addColorStop(1, '#0d1008');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Moon
  const moonX = 620, moonY = 100, moonR = 45;
  ctx.save();
  const moonGlow = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 4);
  moonGlow.addColorStop(0, 'rgba(255,240,200,0.15)');
  moonGlow.addColorStop(0.5, 'rgba(255,200,150,0.05)');
  moonGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffe8c0';
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fill();
  // Moon craters
  ctx.fillStyle = 'rgba(200,180,140,0.3)';
  ctx.beginPath(); ctx.arc(moonX - 12, moonY - 10, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX + 15, moonY + 5, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX - 5, moonY + 15, 6, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Distant mountains
  ctx.fillStyle = '#15101a';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.55);
  for (let x = 0; x <= W; x += 2) {
    const y = H * 0.55 - Math.sin(x * 0.005) * 60 - Math.sin(x * 0.012) * 30 - Math.sin(x * 0.003) * 40;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Closer mountain range
  ctx.fillStyle = '#1a150f';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.65);
  for (let x = 0; x <= W; x += 2) {
    const y = H * 0.65 - Math.sin(x * 0.008 + 1) * 40 - Math.sin(x * 0.02) * 15;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Ground
  const groundGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
  groundGrad.addColorStop(0, '#1a2010');
  groundGrad.addColorStop(1, '#0d1508');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);

  // Samurai silhouette (Jin standing with katana)
  const sx = 180, sy = H * 0.7;
  ctx.fillStyle = '#0a0a0a';
  // Legs
  ctx.fillRect(sx - 8, sy - 60, 6, 30);
  ctx.fillRect(sx + 2, sy - 60, 6, 30);
  // Body
  ctx.fillRect(sx - 12, sy - 95, 24, 38);
  // Shoulders
  ctx.fillRect(sx - 18, sy - 95, 36, 6);
  // Head
  ctx.beginPath(); ctx.arc(sx, sy - 108, 10, 0, Math.PI * 2); ctx.fill();
  // Topknot
  ctx.fillRect(sx - 2, sy - 122, 4, 8);
  // Katana held up
  ctx.save();
  ctx.translate(sx + 16, sy - 90);
  ctx.rotate(-0.3 + Math.sin(titleTime * 0.5) * 0.02);
  ctx.fillRect(-1, 0, 2, -55);
  // Blade glint
  ctx.fillStyle = `rgba(255,240,200,${0.3 + Math.sin(titleTime * 2) * 0.2})`;
  ctx.fillRect(-1, -55, 2, 10);
  ctx.restore();

  // Grass silhouettes in foreground
  for (let x = 0; x < W; x += 4) {
    const gh = 8 + Math.sin(x * 0.3) * 4 + Math.sin(x * 0.7 + titleTime) * 3;
    ctx.fillStyle = `rgba(20,30,10,${0.6 + Math.sin(x * 0.1) * 0.2})`;
    ctx.fillRect(x, H - gh, 2, gh);
  }

  // Falling leaves on title screen
  for (const l of leaves) {
    l.x += l.vx * 0.016;
    l.y += l.vy * 0.016;
    l.wobble += l.wobbleSpd * 0.016;
    l.x += Math.sin(l.wobble) * 0.5;
    l.rot += l.rotSpd * 0.016;
    if (l.x > W + 20) l.x = -20;
    if (l.y > H + 20) { l.y = -20; l.x = Math.random() * W; }

    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.fillStyle = l.color;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.ellipse(0, 0, l.size, l.size * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Fog at bottom
  for (let i = 0; i < 3; i++) {
    const fogX = (titleTime * 15 + i * 300) % (W + 200) - 100;
    const fogGrad = ctx.createRadialGradient(fogX, H - 30 + i * 10, 10, fogX, H - 30 + i * 10, 120);
    fogGrad.addColorStop(0, `rgba(180,180,200,${0.04 + Math.sin(titleTime + i) * 0.02})`);
    fogGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(fogX - 120, H - 150, 240, 150);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, W * 0.25, W/2, H/2, W * 0.6);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ===== Game state =====
let state = 'menu';
let wave = 1;
let enemies = [];
let particles = [];
let slashEffects = [];
let player;
let keys = {};
let mouse = { x: 0, y: 0 };
let combo = 0;
let comboTimer = 0;
let waveTimer = 0;
let shakeX = 0, shakeY = 0;
let shakeDur = 0;
let lastTime = 0;
let bloodMoonAlpha = 0;
let gameTime = 0;

// Player
function createPlayer() {
  return {
    x: W / 2, y: H / 2, w: 24, h: 40,
    vx: 0, vy: 0, speed: 180,
    hp: 120, maxHp: 120,
    resolve: 30, maxResolve: 100,
    facing: 1,
    attacking: false, attackTimer: 0, attackType: 0,
    attackCooldown: 0,
    dashing: false, dashTimer: 0, dashCooldown: 0,
    iframes: 0,
    attackDamage: 25,
    heavyDamage: 50,
    attackRange: 65,
    heavyRange: 80,
    animFrame: 0, walkTimer: 0,
    hitFlash: 0,
    trail: [] // afterimage trail
  };
}

// Enemy types
function createRonin(x, y, type) {
  const isBoss = type === 'boss';
  const isBrute = type === 'brute';
  const isArcher = type === 'archer';
  const isShielded = type === 'shielded';

  let hp, dmg, spd, atkCd, w, h;
  if (isBoss) {
    hp = 300 + wave * 10; dmg = 15; spd = 50; atkCd = 1.2; w = 36; h = 50;
  } else if (isBrute) {
    hp = 30 + wave * 5; dmg = 10 + wave; spd = 28 + wave; atkCd = 2.0; w = 28; h = 44;
  } else if (isArcher) {
    hp = 12 + wave * 3; dmg = 6 + wave * 0.7; spd = 33 + wave * 1.5; atkCd = 2.2 - wave * 0.06; w = 20; h = 36;
  } else if (isShielded) {
    hp = 20 + wave * 4; dmg = 6 + wave * 0.5; spd = 35 + wave * 2; atkCd = 1.5; w = 24; h = 40;
  } else {
    hp = 24 + wave * 5; dmg = 9 + wave * 1.4; spd = 52 + wave * 5 + Math.random() * 22; atkCd = 1.2 - wave * 0.05 + Math.random() * 0.3; w = 22; h = 38;
  }

  return {
    x, y, w, h, vx: 0, vy: 0, speed: spd, hp, maxHp: hp, damage: dmg,
    type: type || 'ronin', attackTimer: Math.random() * 0.5,
    attackCooldown: Math.max(0.3, atkCd), attacking: false, attackDur: 0,
    facing: 1, animFrame: 0, walkTimer: 0, hitFlash: 0, staggerTimer: 0,
    shieldUp: isShielded, shieldBreakHits: isShielded ? 3 : 0,
    shootTimer: isArcher ? 2 : 0, preferredDist: isArcher ? 200 : (isBrute ? 30 : 40),
    slamTimer: isBrute ? 3 : 0, slamming: false, slamDur: 0,
    phase: 1, chargeTimer: 2, charging: false, chargeDirX: 0, chargeDirY: 0,
    flankAngle: Math.random() * Math.PI * 2,
    flanking: Math.random() < 0.3 + wave * 0.05,
  };
}

let projectiles = [];
function spawnArrow(x, y, tx, ty, dmg) {
  const a = Math.atan2(ty - y, tx - x);
  projectiles.push({ x, y, vx: Math.cos(a)*250, vy: Math.sin(a)*250, damage: dmg, life: 3, angle: a, trail: [] });
}

function spawnWave(w) {
  enemies = [];
  projectiles = [];
  function randEdge() {
    const side = Math.floor(Math.random() * 4);
    if (side === 0) return { x: Math.random() * W, y: -30 };
    if (side === 1) return { x: Math.random() * W, y: H + 30 };
    if (side === 2) return { x: -30, y: Math.random() * H };
    return { x: W + 30, y: Math.random() * H };
  }
  if (w === 20) {
    enemies.push(createRonin(W / 2, 80, 'boss'));
    for (let i = 0; i < 1; i++) { const p = randEdge(); enemies.push(createRonin(p.x, p.y, 'shielded')); }
    for (let i = 0; i < 1; i++) { const p = randEdge(); enemies.push(createRonin(p.x, p.y, 'archer')); }
    for (let i = 0; i < 1; i++) { const p = randEdge(); enemies.push(createRonin(p.x, p.y, 'brute')); }
    for (let i = 0; i < 2; i++) { const p = randEdge(); enemies.push(createRonin(p.x, p.y, 'ronin')); }
  } else {
    const roninCount = 3 + Math.floor(w * 1.4);
    for (let i = 0; i < roninCount; i++) { const p = randEdge(); enemies.push(createRonin(p.x, p.y, 'ronin')); }
    if (w >= 3) { const c = Math.floor((w-2)*0.5); for (let i=0;i<c;i++) { const p=randEdge(); enemies.push(createRonin(p.x,p.y,'archer')); }}
    if (w >= 5) { const c = Math.floor((w-4)*0.5); for (let i=0;i<c;i++) { const p=randEdge(); enemies.push(createRonin(p.x,p.y,'brute')); }}
    if (w >= 7) { const c = Math.floor((w-6)*0.5); for (let i=0;i<c;i++) { const p=randEdge(); enemies.push(createRonin(p.x,p.y,'shielded')); }}
  }
  updateHUD();
}

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random());
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 0.3 + Math.random()*0.5, maxLife: 0.3 + Math.random()*0.5,
      size: 2 + Math.random()*3, color, type: 'default'
    });
  }
}

// Blood splatter particles (more dramatic)
function spawnBlood(x, y, angle, count) {
  for (let i = 0; i < count; i++) {
    const a = angle + (Math.random() - 0.5) * 1.5;
    const spd = 80 + Math.random() * 150;
    const colors = ['#cc0000', '#990000', '#ff2200', '#880000'];
    particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 0.4 + Math.random()*0.6, maxLife: 0.4 + Math.random()*0.6,
      size: 2 + Math.random()*5, color: colors[Math.floor(Math.random()*colors.length)],
      type: 'blood', gravity: 100 + Math.random() * 80
    });
  }
}

function spawnSlash(x, y, angle, heavy) {
  slashEffects.push({ x, y, angle, life: 0.2, maxLife: 0.2, length: heavy ? 80 : 55, heavy });
}

function shake(dur, intensity) {
  shakeDur = dur;
  shakeX = (Math.random()-0.5)*intensity;
  shakeY = (Math.random()-0.5)*intensity;
}

function updateHUD() {
  document.getElementById('health-bar').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('resolve-bar').style.width = (player.resolve / player.maxResolve * 100) + '%';
  document.getElementById('wave-text').textContent = `WAVE ${wave} / 20`;
  document.getElementById('enemy-count').textContent = `Enemies: ${enemies.length}`;
}

function showCombo(c) {
  const el = document.getElementById('combo-display');
  if (c > 1) { el.textContent = `${c}x COMBO`; el.classList.add('show'); }
  else { el.classList.remove('show'); }
}

function announceWave(text) {
  const el = document.getElementById('wave-announce');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Input
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  if (e.button === 0) playerAttack(false);
  if (e.button === 2) playerAttack(true);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Title screen animation loop
let titleAnimId;
function titleLoop() {
  drawTitleBG();
  titleAnimId = requestAnimationFrame(titleLoop);
}
titleLoop();

document.getElementById('start-btn').addEventListener('click', startGame);

function startGame() {
  cancelAnimationFrame(titleAnimId);
  document.getElementById('screen-overlay').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  player = createPlayer();
  wave = 1; combo = 0; gameTime = 0;
  state = 'wave_intro'; waveTimer = 2;
  announceWave('WAVE 1');
  spawnWave(1);
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function playerAttack(heavy) {
  if (player.attacking || player.attackCooldown > 0 || player.dashing) return;
  player.attacking = true;
  player.attackTimer = heavy ? 0.3 : 0.2;
  player.attackType = heavy ? 1 : 0;
  player.attackCooldown = heavy ? 0.4 : 0.2;
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  player.facing = Math.cos(angle) >= 0 ? 1 : -1;
  const range = heavy ? player.heavyRange : player.attackRange;
  const dmg = heavy ? player.heavyDamage : player.attackDamage;
  spawnSlash(player.x + Math.cos(angle)*20, player.y + Math.sin(angle)*20, angle, heavy);

  let hitAny = false;
  for (const e of enemies) {
    const dx = e.x - player.x, dy = e.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ae = Math.atan2(dy, dx);
    let ad = Math.abs(ae - angle); if (ad > Math.PI) ad = Math.PI*2 - ad;
    if (dist < range && ad < (heavy ? 1.2 : 0.8)) {
      if (e.type === 'shielded' && e.shieldUp) {
        const front = (e.facing===1&&Math.cos(angle)>0)||(e.facing===-1&&Math.cos(angle)<0);
        if (front && !heavy) { spawnParticles(e.x,e.y,'#ffdd44',4,60); shake(0.05,2); hitAny=true; continue; }
        if (front && heavy) { e.shieldBreakHits--; spawnParticles(e.x,e.y,'#ffdd44',6,80); if(e.shieldBreakHits<=0){e.shieldUp=false;spawnParticles(e.x,e.y,'#ffaa00',12,120);} shake(0.1,4); hitAny=true; continue; }
      }
      const finalDmg = dmg + (combo > 5 ? 5 : 0);
      e.hp -= finalDmg; e.hitFlash = 0.15; e.staggerTimer = heavy ? 0.4 : 0.15;
      const kb = heavy ? 8 : 4;
      e.vx = Math.cos(angle)*kb*60; e.vy = Math.sin(angle)*kb*60;
      spawnBlood(e.x, e.y, angle, heavy ? 12 : 6);
      hitAny = true;
      shake(0.1, heavy ? 6 : 3);
      if (e.hp <= 0) {
        spawnBlood(e.x, e.y, angle, 20);
        spawnParticles(e.x, e.y, '#ffcc00', 5, 80);
        player.resolve = Math.min(player.maxResolve, player.resolve + 25);
      }
    }
  }
  if (hitAny) { combo++; comboTimer = 2; showCombo(combo); }
  enemies = enemies.filter(e => e.hp > 0);
  updateHUD();
}

function tryDash() {
  if (player.dashing || player.dashCooldown > 0) return;
  player.dashing = true; player.dashTimer = 0.15; player.dashCooldown = 0.3; player.iframes = 0.2;
  const angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  player.vx = Math.cos(angle)*500; player.vy = Math.sin(angle)*500;
  // Store trail positions for afterimage
  player.trail.push({ x: player.x, y: player.y, life: 0.3 });
  spawnParticles(player.x, player.y, '#aaaacc', 8, 60);
}

function tryHeal() {
  if (player.resolve >= 20 && player.hp < player.maxHp) {
    player.resolve -= 20;
    player.hp = Math.min(player.maxHp, player.hp + 50);
    spawnParticles(player.x, player.y, '#00ff88', 15, 80);
    spawnParticles(player.x, player.y, '#88ffcc', 8, 50);
    updateHUD();
  }
}

// ===== UPDATE =====
function update(dt) {
  gameTime += dt;
  if (state === 'wave_intro') { waveTimer -= dt; if (waveTimer <= 0) state = 'playing'; updatePlayer(dt); return; }
  if (state !== 'playing') return;
  updatePlayer(dt);
  updateEnemies(dt);
  updateParticles(dt);
  updateSlashes(dt);
  updateEnvironment(dt);

  if (shakeDur > 0) { shakeDur -= dt; shakeX *= 0.9; shakeY *= 0.9; } else { shakeX = 0; shakeY = 0; }
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) { combo = 0; showCombo(0); } }
  if (wave >= 18) { bloodMoonAlpha = Math.min(0.15, bloodMoonAlpha + dt * 0.05); } else { bloodMoonAlpha = 0; }

  if (enemies.length === 0) {
    if (wave >= 20) { state = 'victory'; showEndScreen('VICTORY', 'The Ghost of Tsushima prevails'); }
    else {
      wave++; state = 'wave_intro'; waveTimer = 2;
      const names = {2:'WAVE 2',3:'WAVE 3 — ARCHERS ARRIVE',4:'WAVE 4 — MORE ARCHERS',5:'WAVE 5 — BRUTES APPEAR',6:'WAVE 6 — HEAVY ASSAULT',7:'WAVE 7 — SHIELDED RONIN',8:'WAVE 8 — ELITE FORCE',9:'WAVE 9 — THE ONSLAUGHT',10:'WAVE 10 — HALFWAY POINT',11:'WAVE 11 — NO RETREAT',12:'WAVE 12 — STORM RISING',13:'WAVE 13 — DEATH WIND',14:'WAVE 14 — BLOOD TIDE',15:'WAVE 15 — THE HORDE',16:'WAVE 16 — IRON RAIN',17:'WAVE 17 — SHADOW ARMY',18:'WAVE 18 — CRIMSON DAWN',19:'WAVE 19 — LAST STAND',20:'FINAL WAVE — THE RONIN LORD'};
      announceWave(names[wave]||`WAVE ${wave}`);
      spawnWave(wave);
    }
  }
  if (player.hp <= 0) { state='defeat'; spawnBlood(player.x,player.y,0,30); showEndScreen('DEFEATED',`Fallen at Wave ${wave}`); }
  updateHUD();
}

function updatePlayer(dt) {
  const p = player;
  let mx=0,my=0;
  if(keys['a']||keys['arrowleft'])mx-=1; if(keys['d']||keys['arrowright'])mx+=1;
  if(keys['w']||keys['arrowup'])my-=1; if(keys['s']||keys['arrowdown'])my+=1;
  if(keys[' '])tryDash(); if(keys['q']){tryHeal();keys['q']=false;}
  if(mx!==0||my!==0){const l=Math.sqrt(mx*mx+my*my);mx/=l;my/=l;}

  if(p.dashing){p.dashTimer-=dt;if(p.dashTimer<=0){p.dashing=false;p.vx=0;p.vy=0;}}
  else if(!p.attacking){p.vx=mx*p.speed;p.vy=my*p.speed;if(mx!==0)p.facing=mx>0?1:-1;}
  else{p.vx*=0.85;p.vy*=0.85;}

  p.x+=p.vx*dt; p.y+=p.vy*dt;
  p.x=Math.max(16,Math.min(W-16,p.x)); p.y=Math.max(30,Math.min(H-16,p.y));
  if(p.attacking){p.attackTimer-=dt;if(p.attackTimer<=0)p.attacking=false;}
  if(p.attackCooldown>0)p.attackCooldown-=dt;
  if(p.dashCooldown>0)p.dashCooldown-=dt;
  if(p.iframes>0)p.iframes-=dt;
  if(p.hitFlash>0)p.hitFlash-=dt;
  if(Math.abs(p.vx)>10||Math.abs(p.vy)>10){p.walkTimer+=dt*8;p.animFrame=Math.floor(p.walkTimer)%4;}
  else{p.animFrame=0;p.walkTimer=0;}

  // Update trail
  for (const t of p.trail) t.life -= dt;
  p.trail = p.trail.filter(t => t.life > 0);
  if (p.dashing && Math.random() < 0.5) p.trail.push({ x: p.x, y: p.y, life: 0.2 });
}

function updateEnemies(dt) {
  for (const p of projectiles) {
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if (p.trail) { p.trail.push({x:p.x,y:p.y,life:0.2}); p.trail=p.trail.filter(t=>{t.life-=dt;return t.life>0;}); }
    const dx=p.x-player.x,dy=p.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<20&&player.iframes<=0){
      player.hp-=p.damage;player.hitFlash=0.2;player.iframes=0.3;shake(0.1,3);
      spawnBlood(player.x,player.y,Math.atan2(-dy,-dx),4);p.life=0;
    }
  }
  projectiles=projectiles.filter(p=>p.life>0&&p.x>-20&&p.x<W+20&&p.y>-20&&p.y<H+20);

  for(const e of enemies){
    if(e.staggerTimer>0){e.staggerTimer-=dt;e.vx*=0.9;e.vy*=0.9;e.x+=e.vx*dt;e.y+=e.vy*dt;e.x=Math.max(16,Math.min(W-16,e.x));e.y=Math.max(16,Math.min(H-16,e.y));if(e.hitFlash>0)e.hitFlash-=dt;continue;}
    const dx=player.x-e.x,dy=player.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);

    if(e.type==='boss'){
      if(e.hp<e.maxHp*0.5&&e.phase===1){e.phase=2;e.speed=65;e.damage=20;e.attackCooldown=1.0;spawnParticles(e.x,e.y,'#ff4400',20,150);shake(0.3,8);}
      if(e.hp<e.maxHp*0.25&&e.phase===2){e.phase=3;e.speed=80;e.damage=25;e.attackCooldown=0.7;spawnParticles(e.x,e.y,'#ff0000',25,200);shake(0.5,12);}
      e.chargeTimer-=dt;
      if(e.chargeTimer<=0&&!e.charging&&dist>80){e.charging=true;e.chargeTimer=e.phase>=3?1.0:e.phase===2?1.5:2.5;const a=Math.atan2(dy,dx);e.vx=Math.cos(a)*(300+e.phase*40);e.vy=Math.sin(a)*(300+e.phase*40);spawnParticles(e.x,e.y,'#ff6600',8,100);}
      if(e.charging){e.x+=e.vx*dt;e.y+=e.vy*dt;e.vx*=0.97;e.vy*=0.97;if(Math.abs(e.vx)<30&&Math.abs(e.vy)<30){e.charging=false;if(e.phase>=2){shake(0.3,10);spawnParticles(e.x,e.y,'#ff4400',15,120);if(dist<80&&player.iframes<=0){player.hp-=e.damage*0.5;player.hitFlash=0.2;player.iframes=0.4;}}}if(dist<40&&player.iframes<=0){player.hp-=e.damage;player.hitFlash=0.2;player.iframes=0.5;shake(0.2,10);spawnBlood(player.x,player.y,Math.atan2(-dy,-dx),8);}}
      else{if(dist>50){e.x+=(dx/dist)*e.speed*dt;e.y+=(dy/dist)*e.speed*dt;}}
    } else if(e.type==='archer'){
      if(dist>e.preferredDist+30){e.x+=(dx/dist)*e.speed*dt;e.y+=(dy/dist)*e.speed*dt;}
      else if(dist<e.preferredDist-30){e.x-=(dx/dist)*e.speed*0.7*dt;e.y-=(dy/dist)*e.speed*0.7*dt;}
      else{e.flankAngle+=dt*1.5;e.x+=Math.cos(e.flankAngle)*e.speed*0.3*dt;e.y+=Math.sin(e.flankAngle)*e.speed*0.3*dt;}
      e.shootTimer-=dt;
      if(e.shootTimer<=0&&dist<350){e.shootTimer=e.attackCooldown;e.attacking=true;e.attackDur=0.3;spawnArrow(e.x,e.y,player.x,player.y,e.damage);spawnParticles(e.x+dx/dist*10,e.y+dy/dist*10,'#886633',3,40);}
    } else if(e.type==='brute'){
      if(dist>35){e.x+=(dx/dist)*e.speed*dt;e.y+=(dy/dist)*e.speed*dt;}
      e.slamTimer-=dt;
      if(e.slamTimer<=0&&dist<80&&!e.slamming){e.slamming=true;e.slamDur=0.5;e.slamTimer=3+Math.random();}
      if(e.slamming){e.slamDur-=dt;if(e.slamDur<=0){e.slamming=false;shake(0.2,8);spawnParticles(e.x,e.y,'#996633',12,100);if(dist<70&&player.iframes<=0){player.hp-=e.damage*1.5;player.hitFlash=0.2;player.iframes=0.5;spawnBlood(player.x,player.y,0,8);}}}
    } else if(e.type==='shielded'){
      if(dist>40){e.x+=(dx/dist)*e.speed*dt;e.y+=(dy/dist)*e.speed*dt;}
    } else {
      if(e.flanking&&dist<150&&dist>50){e.flankAngle+=dt*2;const fx=player.x+Math.cos(e.flankAngle)*60,fy=player.y+Math.sin(e.flankAngle)*60;const fdx=fx-e.x,fdy=fy-e.y,fd=Math.sqrt(fdx*fdx+fdy*fdy);if(fd>5){e.x+=(fdx/fd)*e.speed*dt;e.y+=(fdy/fd)*e.speed*dt;}}
      else if(dist>40){e.x+=(dx/dist)*e.speed*dt;e.y+=(dy/dist)*e.speed*dt;}
    }

    e.facing=dx>0?1:-1;
    e.x=Math.max(16,Math.min(W-16,e.x)); e.y=Math.max(16,Math.min(H-16,e.y));

    if(e.type!=='archer'&&!e.slamming){
      e.attackTimer-=dt;
      if(dist<45&&e.attackTimer<=0&&!e.charging){e.attacking=true;e.attackDur=0.2;e.attackTimer=e.attackCooldown;
        if(player.iframes<=0){player.hp-=e.damage;player.hitFlash=0.2;player.iframes=0.3;shake(0.1,e.type==='brute'?6:4);spawnBlood(player.x,player.y,Math.atan2(player.y-e.y,player.x-e.x),5);}}
    }
    if(e.attacking){e.attackDur-=dt;if(e.attackDur<=0)e.attacking=false;}
    if(e.hitFlash>0)e.hitFlash-=dt;
    e.walkTimer+=dt*6;e.animFrame=Math.floor(e.walkTimer)%4;
    for(const o of enemies){if(o===e)continue;const sx=e.x-o.x,sy=e.y-o.y,sd=Math.sqrt(sx*sx+sy*sy);if(sd<30&&sd>0){e.x+=(sx/sd)*60*dt;e.y+=(sy/sd)*60*dt;}}
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.95; p.vy*=0.95; p.life-=dt;
    if (p.type === 'blood' && p.gravity) p.vy += p.gravity * dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function updateSlashes(dt) {
  for (const s of slashEffects) s.life -= dt;
  slashEffects = slashEffects.filter(s => s.life > 0);
}

function updateEnvironment(dt) {
  for (const l of leaves) {
    l.x += l.vx * dt; l.y += l.vy * dt;
    l.wobble += l.wobbleSpd * dt; l.x += Math.sin(l.wobble) * 0.5;
    l.rot += l.rotSpd * dt;
    if (l.x > W + 20) l.x = -20;
    if (l.y > H + 20) { l.y = -20; l.x = Math.random() * W; }
  }
}

// ===== DRAW =====
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Sky gradient based on wave
  const skyDark = wave >= 8 ? 0.08 : 0.12;
  const skyR = wave >= 8 ? 15 : 20;
  const skyG = wave >= 8 ? 10 : 30;
  const skyB = wave >= 8 ? 20 : 15;
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, `rgb(${skyR},${skyG},${skyB})`);
  sky.addColorStop(0.5, `rgb(${skyR+10},${skyG+15},${skyB-5})`);
  sky.addColorStop(1, '#1a2510');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Moon (smaller during gameplay)
  if (wave < 10) {
    const moonX = 680, moonY = 60, moonR = 25;
    const mg = ctx.createRadialGradient(moonX,moonY,moonR*0.3,moonX,moonY,moonR*3);
    mg.addColorStop(0, 'rgba(255,240,200,0.1)');
    mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ffe8c0';
    ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
  } else {
    // Blood moon for wave 10
    const moonX = 680, moonY = 60, moonR = 30;
    const mg = ctx.createRadialGradient(moonX,moonY,moonR*0.3,moonX,moonY,moonR*4);
    mg.addColorStop(0, 'rgba(255,60,0,0.15)');
    mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#cc3300';
    ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
  }

  // Trees in background
  for (const t of trees) {
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(t.x - 3, t.y - t.trunkH, 6, t.trunkH);
    ctx.fillStyle = wave >= 8 ? '#1a0808' : '#1a2a0a';
    ctx.beginPath(); ctx.arc(t.x, t.y - t.trunkH - t.canopyR * 0.5, t.canopyR, 0, Math.PI * 2); ctx.fill();
    // Some leaves falling from trees
    ctx.fillStyle = wave >= 8 ? 'rgba(150,30,10,0.15)' : 'rgba(30,50,15,0.15)';
    ctx.beginPath(); ctx.arc(t.x - 5, t.y - t.trunkH - t.canopyR * 0.3, t.canopyR * 0.7, 0, Math.PI * 2); ctx.fill();
  }

  // Ground with gradient
  const ground = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 400);
  ground.addColorStop(0, '#2a2014');
  ground.addColorStop(0.6, '#1a2510');
  ground.addColorStop(1, '#0d1508');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.15, W, H * 0.85);

  // Arena circle (subtle dirt path)
  ctx.save();
  const arenaGrad = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, 320);
  arenaGrad.addColorStop(0, 'rgba(50,40,25,0.6)');
  arenaGrad.addColorStop(0.7, 'rgba(40,35,20,0.3)');
  arenaGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = arenaGrad;
  ctx.beginPath(); ctx.ellipse(W/2, H/2, 350, 260, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Grass blades
  for (const g of grassBlades) {
    const sway = Math.sin(gameTime * 1.5 + g.phase) * 3;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.quadraticCurveTo(g.x + sway * 0.5, g.y - g.h * 0.5, g.x + sway, g.y - g.h);
    ctx.stroke();
  }

  // Rocks
  for (const r of rocks) {
    const rGrad = ctx.createLinearGradient(r.x, r.y - r.h, r.x, r.y);
    rGrad.addColorStop(0, '#4a4035');
    rGrad.addColorStop(1, '#2a2520');
    ctx.fillStyle = rGrad;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.w/2, r.h/2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Rock highlight
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.ellipse(r.x - r.w*0.1, r.y - r.h*0.2, r.w*0.3, r.h*0.25, -0.3, 0, Math.PI*2);
    ctx.fill();
  }

  // Blood moon overlay
  if (bloodMoonAlpha > 0) {
    ctx.fillStyle = `rgba(150,0,0,${bloodMoonAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Sort characters by Y for depth
  const allChars = [...enemies.map(e => ({c:e, isEnemy:true})), {c:player, isEnemy:false}];
  allChars.sort((a,b) => a.c.y - b.c.y);

  // Draw player trail (afterimages)
  for (const t of player.trail) {
    const a = t.life / 0.3;
    ctx.globalAlpha = a * 0.3;
    ctx.fillStyle = '#8899cc';
    ctx.fillRect(t.x - 10, t.y - 20, 20, 40);
    ctx.globalAlpha = 1;
  }

  // Draw all characters
  for (const {c, isEnemy} of allChars) drawCharacter(c, isEnemy);

  // Draw arrows with trails
  for (const p of projectiles) {
    // Arrow trail
    if (p.trail) {
      for (let i = 0; i < p.trail.length; i++) {
        const t = p.trail[i];
        ctx.globalAlpha = t.life / 0.2 * 0.3;
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(t.x - 1, t.y - 1, 2, 2);
      }
      ctx.globalAlpha = 1;
    }
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    // Arrow shaft
    ctx.fillStyle = '#aa8844'; ctx.fillRect(-10, -1, 20, 2);
    // Arrowhead
    ctx.fillStyle = '#ccc';
    ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(5,-3); ctx.lineTo(5,3); ctx.fill();
    // Fletching
    ctx.fillStyle = '#cc4422';
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-7,-3); ctx.lineTo(-7,0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-7,3); ctx.lineTo(-7,0); ctx.fill();
    ctx.restore();
  }

  // Slash effects (more dramatic)
  for (const s of slashEffects) {
    const alpha = s.life / s.maxLife;
    ctx.save();
    ctx.translate(s.x, s.y); ctx.rotate(s.angle);
    // Outer glow
    ctx.strokeStyle = `rgba(150,180,255,${alpha * 0.3})`;
    ctx.lineWidth = s.heavy ? 12 : 6;
    ctx.beginPath();
    const spread = s.heavy ? 0.7 : 0.5;
    ctx.arc(0, 0, s.length * (1-alpha*0.3), -spread, spread);
    ctx.stroke();
    // Main slash
    ctx.strokeStyle = `rgba(220,230,255,${alpha})`;
    ctx.lineWidth = s.heavy ? 4 : 2;
    ctx.beginPath();
    ctx.arc(0, 0, s.length * (1-alpha*0.3), -spread, spread);
    ctx.stroke();
    // Inner bright core
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
    ctx.lineWidth = s.heavy ? 2 : 1;
    ctx.beginPath();
    ctx.arc(0, 0, s.length * (1-alpha*0.3) * 0.9, -spread*0.6, spread*0.6);
    ctx.stroke();
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'blood') {
      // Blood drops are round
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    }
  }
  ctx.globalAlpha = 1;

  // Falling leaves during gameplay
  for (const l of leaves) {
    ctx.save();
    ctx.translate(l.x, l.y); ctx.rotate(l.rot);
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = l.color;
    ctx.beginPath(); ctx.ellipse(0, 0, l.size, l.size*0.4, 0, 0, Math.PI*2); ctx.fill();
    // Leaf vein
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-l.size, 0); ctx.lineTo(l.size, 0); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Fireflies
  for (const f of fireflies) {
    f.phase += 0.02;
    f.driftX += 0.01; f.driftY += 0.008;
    const fx = f.x + Math.sin(f.driftX) * 50;
    const fy = f.y + Math.cos(f.driftY) * 30;
    const brightness = 0.3 + Math.sin(f.phase) * 0.3;
    const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, 8);
    glow.addColorStop(0, `rgba(200,255,100,${brightness})`);
    glow.addColorStop(1, 'rgba(200,255,100,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(fx - 8, fy - 8, 16, 16);
    ctx.fillStyle = `rgba(220,255,150,${brightness + 0.2})`;
    ctx.beginPath(); ctx.arc(fx, fy, 1.5, 0, Math.PI*2); ctx.fill();
  }

  // Fog layers
  for (let i = 0; i < 4; i++) {
    const fogX = ((gameTime * 10 + i * 200) % (W + 300)) - 150;
    const fogY = H - 40 + Math.sin(gameTime * 0.5 + i) * 15;
    const fg = ctx.createRadialGradient(fogX, fogY, 5, fogX, fogY, 100 + i * 20);
    fg.addColorStop(0, `rgba(150,160,170,${0.03 + Math.sin(gameTime + i) * 0.015})`);
    fg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fg;
    ctx.fillRect(fogX - 120, fogY - 80, 240, 160);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.55);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

function drawCharacter(c, isEnemy) {
  const p = c;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Dynamic shadow (stretched based on moon position)
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(4, p.h/2 + 2, p.w * 0.7, 6, 0.1, 0, Math.PI * 2);
  ctx.fill();

  const bob = Math.sin(p.walkTimer * 2) * 2;
  if (p.hitFlash > 0) ctx.globalAlpha = 0.5 + Math.sin(Date.now()/30)*0.5;
  if (!isEnemy && player.iframes > 0) ctx.globalAlpha = 0.3 + Math.sin(Date.now()/40)*0.3;

  const f = p.facing;

  if (!isEnemy) {
    // === JIN SAKAI — detailed samurai ===
    const legOff = [0, 4, 0, -4][p.animFrame];

    // Hakama (pants) with shading
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(-7, 8 + bob, 6, 16 + legOff);
    ctx.fillRect(1, 8 + bob, 6, 16 - legOff);
    // Hakama highlight
    ctx.fillStyle = '#252540';
    ctx.fillRect(-5, 10 + bob, 2, 12 + legOff);
    ctx.fillRect(3, 10 + bob, 2, 12 - legOff);

    // Feet
    ctx.fillStyle = '#2a2a1a';
    ctx.fillRect(-8, 23 + bob + legOff, 7, 3);
    ctx.fillRect(0, 23 + bob - legOff, 7, 3);

    // Body (Ghost armor - white/blue)
    const bodyGrad = ctx.createLinearGradient(-12, -14 + bob, 12, 12 + bob);
    bodyGrad.addColorStop(0, p.hitFlash > 0 ? '#ff4444' : '#d8d4cc');
    bodyGrad.addColorStop(1, p.hitFlash > 0 ? '#cc2222' : '#b0aca4');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-12, -14 + bob, 24, 24);

    // Shoulder armor plates
    ctx.fillStyle = '#4a6fa5';
    ctx.fillRect(-14, -14 + bob, 6, 10);
    ctx.fillRect(8, -14 + bob, 6, 10);
    // Armor trim
    ctx.fillStyle = '#2a3f60';
    ctx.fillRect(-12, -6 + bob, 24, 3);
    // Chest emblem
    ctx.fillStyle = '#3a5a8a';
    ctx.fillRect(-4, -12 + bob, 8, 6);
    // Belt/obi
    ctx.fillStyle = '#8a7040';
    ctx.fillRect(-12, 6 + bob, 24, 4);
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(-6, 5 + bob, 12, 6);

    // Neck
    ctx.fillStyle = '#c4a070';
    ctx.fillRect(-3, -17 + bob, 6, 4);

    // Head
    const headGrad = ctx.createRadialGradient(0, -24 + bob, 2, 0, -24 + bob, 9);
    headGrad.addColorStop(0, '#d4a574');
    headGrad.addColorStop(1, '#b08050');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.ellipse(0, -24 + bob, 7, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(f > 0 ? 1 : -4, -25 + bob, 2, 2);
    ctx.fillRect(f > 0 ? 4 : -7, -25 + bob, 2, 2);

    // Hair (top knot, more detailed)
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(0, -30 + bob, 6, 4, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-2, -36 + bob, 4, 7);
    // Hair tie
    ctx.fillStyle = '#8a7040';
    ctx.fillRect(-3, -30 + bob, 6, 2);

    // Katana
    if (p.attacking) {
      ctx.save();
      const swingAngle = p.attackType === 1 ?
        Math.sin(p.attackTimer/0.3*Math.PI)*2.5*f :
        Math.sin(p.attackTimer/0.2*Math.PI)*2*f;
      ctx.rotate(swingAngle);
      // Handle (tsuka)
      ctx.fillStyle = '#2a1a0a';
      ctx.fillRect(f*8, -10 + bob, 3, -12);
      // Handle wrap
      ctx.fillStyle = '#4a3020';
      for (let i = 0; i < 4; i++) ctx.fillRect(f*8, -12 - i*3 + bob, 3, 1);
      // Guard (tsuba)
      ctx.fillStyle = '#888';
      ctx.fillRect(f*7, -22 + bob, 5, 3);
      // Blade
      const bladeGrad = ctx.createLinearGradient(f*8, -24 + bob, f*8, -60 + bob);
      bladeGrad.addColorStop(0, '#ccc');
      bladeGrad.addColorStop(0.5, '#eee');
      bladeGrad.addColorStop(1, '#fff');
      ctx.fillStyle = bladeGrad;
      ctx.fillRect(f*8.5, -24 + bob, 2, -35);
      // Blade edge gleam
      ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(Date.now()/100)*0.3})`;
      ctx.fillRect(f*8.5, -50 + bob, 2, 8);
      ctx.restore();
    } else {
      // Sheathed katana (at hip)
      ctx.fillStyle = '#2a1a0a'; // scabbard
      ctx.save();
      ctx.translate(f * -8, 2 + bob);
      ctx.rotate(f * 0.3);
      ctx.fillRect(0, -20, 3, 30);
      ctx.fillStyle = '#888'; // guard
      ctx.fillRect(-1, -20, 5, 2);
      ctx.restore();
    }

    // Dash effect
    if (p.dashing) {
      ctx.fillStyle = 'rgba(150,170,220,0.2)';
      ctx.beginPath();
      ctx.ellipse(0, 0, 25, 35, 0, 0, Math.PI*2);
      ctx.fill();
    }

  } else {
    // === ENEMY DRAWING (improved) ===
    const isBoss = c.type === 'boss';
    const isBrute = c.type === 'brute';
    const isArcher = c.type === 'archer';
    const isShielded = c.type === 'shielded';
    const legOff = [0, 3, 0, -3][p.animFrame];
    const sc = isBrute ? 1.3 : 1;

    // Legs
    ctx.fillStyle = isBoss ? '#2a1a1a' : isBrute ? '#2a1a10' : isArcher ? '#1a2a1a' : isShielded ? '#1a1a2a' : '#2a2a1a';
    ctx.fillRect(-5*sc, 8+bob, 5*sc, ((isBoss?16:14)*sc)+legOff);
    ctx.fillRect(1*sc, 8+bob, 5*sc, ((isBoss?16:14)*sc)-legOff);

    // Feet
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-6*sc, (isBoss?23:21)+bob+legOff, 6*sc, 3);
    ctx.fillRect(0, (isBoss?23:21)+bob-legOff, 6*sc, 3);

    let bodyColor;
    if (p.hitFlash > 0) bodyColor = '#ff4444';
    else if (isBoss) bodyColor = c.phase >= 3 ? '#8a0505' : c.phase === 2 ? '#6a1010' : '#4a1010';
    else if (isBrute) bodyColor = '#5a3010';
    else if (isArcher) bodyColor = '#2a4a20';
    else if (isShielded) bodyColor = '#3a3a5a';
    else bodyColor = '#5a3a20';

    const bw = isBoss ? 28 : Math.round(20*sc);
    const bh = isBoss ? 26 : Math.round(22*sc);
    const bx = isBoss ? -14 : -Math.round(10*sc);

    // Body with gradient
    const eBodyGrad = ctx.createLinearGradient(bx, -14+bob, bx+bw, -14+bh+bob);
    eBodyGrad.addColorStop(0, bodyColor);
    eBodyGrad.addColorStop(1, darkenColor(bodyColor, 0.7));
    ctx.fillStyle = eBodyGrad;
    ctx.fillRect(bx, -14+bob, bw, bh);

    // Armor plates
    ctx.fillStyle = isBoss?'#8a2020':isBrute?'#6a4020':isArcher?'#3a5a2a':isShielded?'#5a5a7a':'#3a3a2a';
    ctx.fillRect(bx, -6+bob, bw, 4);
    // Armor highlight
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(bx+2, -12+bob, bw-4, 3);

    // Neck
    ctx.fillStyle = '#b08050';
    ctx.fillRect(-3, -18+bob, 6, 4);

    // Head (round)
    ctx.fillStyle = '#c4956a';
    ctx.beginPath();
    ctx.ellipse(0, isBoss ? -24 : -22 + bob, isBoss ? 8 : 6, isBoss ? 8 : 7, 0, 0, Math.PI*2);
    ctx.fill();

    // Eyes
    if (isBoss) {
      ctx.fillStyle = c.phase >= 3 ? '#ff0000' : c.phase === 2 ? '#ff3300' : '#ff6600';
      ctx.beginPath(); ctx.arc(-4, -24+bob, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -24+bob, 2, 0, Math.PI*2); ctx.fill();
      // Eye glow
      const eg = ctx.createRadialGradient(0, -24+bob, 2, 0, -24+bob, 15);
      eg.addColorStop(0, `rgba(255,${c.phase>=3?'0':'60'},0,0.2)`);
      eg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = eg; ctx.fillRect(-15, -38+bob, 30, 28);
    } else {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-3, -23+bob, 2, 2);
      ctx.fillRect(2, -23+bob, 2, 2);
    }

    // Helmet/headgear
    if (isBoss) {
      // Oni mask / war helmet
      ctx.fillStyle = c.phase >= 3 ? '#cc0000' : '#aa0000';
      ctx.beginPath();
      ctx.ellipse(0, -28+bob, 10, 6, 0, Math.PI, Math.PI*2);
      ctx.fill();
      ctx.fillRect(-10, -28+bob, 20, 3);
      // Horns
      ctx.fillStyle = c.phase >= 3 ? '#ff2200' : '#aa0000';
      ctx.beginPath();
      ctx.moveTo(-10, -28+bob); ctx.lineTo(-16, -40+bob); ctx.lineTo(-7, -30+bob);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(10, -28+bob); ctx.lineTo(16, -40+bob); ctx.lineTo(7, -30+bob);
      ctx.fill();
      // Cape
      ctx.fillStyle = `rgba(${c.phase>=3?'150':'100'},0,0,0.5)`;
      ctx.beginPath();
      ctx.moveTo(-14, -10+bob); ctx.lineTo(-18, 18+bob); ctx.lineTo(18, 18+bob); ctx.lineTo(14, -10+bob);
      ctx.fill();
    } else if (isBrute) {
      ctx.fillStyle = '#6a3a10';
      ctx.beginPath(); ctx.ellipse(0, -26+bob, 8, 5, 0, Math.PI, Math.PI*2); ctx.fill();
      // Shoulder spikes
      ctx.fillStyle = '#5a3010';
      ctx.beginPath(); ctx.moveTo(-14,-10+bob); ctx.lineTo(-18,-18+bob); ctx.lineTo(-10,-12+bob); ctx.fill();
      ctx.beginPath(); ctx.moveTo(14,-10+bob); ctx.lineTo(18,-18+bob); ctx.lineTo(10,-12+bob); ctx.fill();
    } else if (isArcher) {
      ctx.fillStyle = '#2a5a20';
      ctx.beginPath(); ctx.ellipse(0, -25+bob, 7, 4, 0, Math.PI, Math.PI*2); ctx.fill();
    } else if (isShielded) {
      ctx.fillStyle = '#4a4a6a';
      ctx.beginPath(); ctx.ellipse(0, -26+bob, 8, 5, 0, Math.PI, Math.PI*2); ctx.fill();
    } else {
      // Ronin bandana
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(-7, -27+bob, 14, 4);
      // Bandana tails
      ctx.fillStyle = '#8b0000';
      ctx.beginPath(); ctx.moveTo(-7,-25+bob); ctx.lineTo(-12,-20+bob); ctx.lineTo(-6,-24+bob); ctx.fill();
    }

    // Brute slam warning
    if (isBrute && c.slamming) {
      ctx.fillStyle = `rgba(255,100,0,${0.3+Math.sin(Date.now()/50)*0.3})`;
      ctx.beginPath(); ctx.arc(0, c.h/2, 45*(1-c.slamDur/0.5), 0, Math.PI*2); ctx.fill();
      // Warning ring
      ctx.strokeStyle = `rgba(255,80,0,${0.5+Math.sin(Date.now()/30)*0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, c.h/2, 50*(1-c.slamDur/0.5), 0, Math.PI*2); ctx.stroke();
    }

    // Archer gear
    if (isArcher) {
      // Quiver
      ctx.fillStyle = '#886633';
      ctx.fillRect(-f*8, -16+bob, 4, 20);
      ctx.fillStyle = '#aa8844';
      ctx.fillRect(-f*9, -22+bob, 1, 12);
      ctx.fillRect(-f*7, -20+bob, 1, 12);
      ctx.fillRect(-f*6, -19+bob, 1, 10);
    }

    // Shield
    if (isShielded && c.shieldUp) {
      const shGrad = ctx.createLinearGradient(f*10, -16+bob, f*18, -16+bob);
      shGrad.addColorStop(0, '#7a7a9a');
      shGrad.addColorStop(1, '#5a5a7a');
      ctx.fillStyle = shGrad;
      ctx.fillRect(f*10, -16+bob, f*10, 26);
      ctx.strokeStyle = '#9a9abb';
      ctx.lineWidth = 2;
      ctx.strokeRect(f*10, -16+bob, f*10, 26);
      // Emblem
      ctx.fillStyle = '#aaaacc';
      ctx.beginPath(); ctx.arc(f*15, -3+bob, 4, 0, Math.PI*2); ctx.fill();
    }

    // Weapon
    if (p.attacking && c.type !== 'archer') {
      ctx.save();
      ctx.rotate(Math.sin(p.attackDur/0.2*Math.PI)*2*f);
      ctx.fillStyle = '#555';
      ctx.fillRect(f*8, -12+bob, isBrute?4:2, -(isBoss?38:isBrute?32:26));
      ctx.fillStyle = '#999';
      ctx.fillRect(f*8, -12+bob-(isBoss?38:isBrute?32:26), isBrute?4:2, 5);
      ctx.restore();
    } else if (isArcher) {
      // Bow (curved)
      ctx.strokeStyle = '#885522'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(f*14, -5+bob, 16, -1.3, 1.3, false); ctx.stroke();
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(f*14+Math.cos(-1.3)*16, -5+bob+Math.sin(-1.3)*16);
      ctx.lineTo(f*14+Math.cos(1.3)*16, -5+bob+Math.sin(1.3)*16);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#666';
      ctx.fillRect(f*8, -8+bob, isBrute?4:2, isBrute?26:22);
      // Weapon tip
      ctx.fillStyle = '#888';
      ctx.fillRect(f*8, -8+bob, isBrute?4:2, 3);
    }

    // Health bar for boss
    if (isBoss) {
      const bw2 = 90;
      ctx.fillStyle = '#222'; ctx.fillRect(-bw2/2-1, -48, bw2+2, 8);
      const hpGrad = ctx.createLinearGradient(-bw2/2, 0, -bw2/2+bw2*(c.hp/c.maxHp), 0);
      hpGrad.addColorStop(0, c.phase>=3?'#ff0000':c.phase===2?'#ff2200':'#cc0000');
      hpGrad.addColorStop(1, c.phase>=3?'#ff4400':c.phase===2?'#ff4400':'#ff2200');
      ctx.fillStyle = hpGrad;
      ctx.fillRect(-bw2/2, -47, bw2*(c.hp/c.maxHp), 6);
      ctx.strokeStyle = '#555'; ctx.strokeRect(-bw2/2, -47, bw2, 6);
      ctx.fillStyle = '#e8d5b0'; ctx.font = '10px "Noto Serif JP", serif'; ctx.textAlign = 'center';
      ctx.fillText(c.phase>=3?'RONIN LORD — ENRAGED':c.phase===2?'RONIN LORD — FURY':'RONIN LORD', 0, -53);
    }

    // Mini HP bar
    if ((isBrute || isShielded) && c.hp < c.maxHp) {
      const mw = 22;
      ctx.fillStyle = '#222'; ctx.fillRect(-mw/2, -32, mw, 4);
      ctx.fillStyle = '#cc4400'; ctx.fillRect(-mw/2, -32, mw*(c.hp/c.maxHp), 4);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// Helper to darken a hex color
function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function showEndScreen(title, subtitle) {
  const overlay = document.getElementById('screen-overlay');
  overlay.style.display = 'flex';
  const isVictory = title === 'VICTORY';
  overlay.innerHTML = `
    <div class="jp-text">${isVictory ? '' : ''}</div>
    <h1 style="${isVictory ? 'text-shadow: 0 0 40px rgba(255,200,0,0.6), 0 0 80px rgba(255,200,0,0.3), 0 4px 8px rgba(0,0,0,0.8);' : ''}">${title}</h1>
    <h2>${subtitle}</h2>
    <div class="subtitle">Waves Cleared: ${isVictory ? 20 : wave - 1} | Combo Record: ${combo}</div>
    <button onclick="location.reload()">PLAY AGAIN</button>
  `;
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  if (state !== 'victory' && state !== 'defeat') requestAnimationFrame(gameLoop);
  else draw();
}
</script>
