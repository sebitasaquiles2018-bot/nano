<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Samurai Helmet — 3D Printable</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10;
  }
  button {
    padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform 0.1s;
  }
  button:hover { transform: scale(1.05); }
  #exportBtn { background: #c9a227; color: #111; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #666; font-size: 12px; pointer-events: none; text-align: center;
  }
  #dims {
    position: fixed; top: 20px; left: 20px; color: #888; font-size: 13px; line-height: 1.6;
  }
</style>
</head>
<body>
<div id="dims">
  <strong style="color:#c9a227">Samurai Kabuto — 3D Printable</strong><br>
  Inner diameter: ~200 mm<br>
  Wall thickness: 3 mm<br>
  Format: Binary STL
</div>
<div id="ui">
  <button id="exportBtn" onclick="exportSTL()">Download STL</button>
</div>
<div id="info">Drag to rotate · Scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Dimensions in mm
const WALL = 3;
const IR = 100;   // inner radius — 200mm head
const OR = IR + WALL;

// Materials
const iron = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.9, roughness: 0.3 });
const gold = new THREE.MeshStandardMaterial({ color: 0xc9a227, metalness: 0.85, roughness: 0.2 });
const red  = new THREE.MeshStandardMaterial({ color: 0x8b1a1a, metalness: 0.3, roughness: 0.4 });
const dark = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.85, roughness: 0.3 });

const helmet = new THREE.Group();

// ── DOME — outer + inner shell ──
const outerDome = new THREE.Mesh(
  new THREE.SphereGeometry(OR, 48, 24, 0, Math.PI * 2, 0, Math.PI * 0.55),
  iron
);
outerDome.scale.set(1, 0.85, 1.05);
helmet.add(outerDome);

const innerMat = iron.clone();
innerMat.side = THREE.BackSide;
const innerDome = new THREE.Mesh(
  new THREE.SphereGeometry(IR, 48, 24, 0, Math.PI * 2, 0, Math.PI * 0.55),
  innerMat
);
innerDome.scale.set(1, 0.85, 1.05);
helmet.add(innerDome);

// Bottom rim seal
helmet.add((() => {
  const m = new THREE.Mesh(new THREE.TorusGeometry(IR + WALL / 2, WALL / 2 + 1, 8, 48), dark);
  m.rotation.x = Math.PI / 2;
  m.position.y = -4;
  return m;
})());

// ── TOP KNOB ──
const kb = new THREE.Mesh(new THREE.CylinderGeometry(10, 15, 8, 16), gold);
kb.position.y = OR * 0.85 - 2;
helmet.add(kb);
const kn = new THREE.Mesh(new THREE.SphereGeometry(8, 12, 12), gold);
kn.position.y = OR * 0.85 + 6;
helmet.add(kn);

// ── PLATE RIDGES — 8 gold lines ──
for (let i = 0; i < 8; i++) {
  const a = (i / 8) * Math.PI * 2;
  const pts = [];
  for (let t = 0; t <= 1; t += 0.1) {
    pts.push(new THREE.Vector3(
      Math.sin(a) * (10 + t * (OR + 2)),
      OR * 0.85 - t * OR * 0.9,
      Math.cos(a) * (10 + t * (OR + 2)) * 1.05
    ));
  }
  helmet.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 16, 2, 6, false), gold));
}

// ── FRONT VISOR — simple curved plate ──
const vs = new THREE.Shape();
vs.moveTo(-70, 0);
vs.quadraticCurveTo(0, 50, 70, 0);
vs.quadraticCurveTo(0, 12, -70, 0);
const visor = new THREE.Mesh(
  new THREE.ExtrudeGeometry(vs, { depth: WALL + 2, bevelEnabled: true, bevelThickness: 2, bevelSize: 2, bevelSegments: 2 }),
  dark
);
visor.rotation.x = -Math.PI / 2 + 0.25;
visor.position.set(0, -8, OR + 5);
helmet.add(visor);

// ── NECK GUARD — 4 solid plates ──
for (let i = 0; i < 4; i++) {
  const y = -10 - i * 13;
  const r = OR + 2 + i * 9;
  const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r + 3, WALL + 2, 36, 1, false, Math.PI * 0.2, Math.PI * 0.6),
    i % 2 === 0 ? dark : red
  );
  plate.position.y = y;
  plate.rotation.y = Math.PI;
  helmet.add(plate);
}

// ── CRESCENT CREST ──
const cs = new THREE.Shape();
cs.moveTo(-50, 0);
cs.quadraticCurveTo(-30, 28, 0, 30);
cs.quadraticCurveTo(30, 28, 50, 0);
cs.quadraticCurveTo(30, 18, 0, 20);
cs.quadraticCurveTo(-30, 18, -50, 0);
const crescent = new THREE.Group();
crescent.add(new THREE.Mesh(
  new THREE.ExtrudeGeometry(cs, { depth: WALL + 2, bevelEnabled: true, bevelThickness: 1.5, bevelSize: 1.5, bevelSegments: 2 }),
  gold
));
// Mount
const mt = new THREE.Mesh(new THREE.BoxGeometry(12, 18, WALL + 2), gold);
mt.position.set(0, -9, (WALL + 2) / 2);
crescent.add(mt);
crescent.position.set(0, OR * 0.85 + 5, 45);
crescent.rotation.x = -0.3;
helmet.add(crescent);

// ── CHEEK + CHIN (face guard) ──
const chin = new THREE.Mesh(
  new THREE.SphereGeometry(45, 24, 12, 0, Math.PI * 2, Math.PI * 0.25, Math.PI * 0.35),
  iron
);
chin.position.set(0, -45, 50);
chin.scale.set(1.8, 1, 1.3);
helmet.add(chin);

// Nose
const nose = new THREE.Mesh(new THREE.BoxGeometry(10, 22, WALL + 3), iron);
nose.position.set(0, -22, OR + 5);
helmet.add(nose);

// ── THROAT PLATES ──
for (let i = 0; i < 3; i++) {
  const tp = new THREE.Mesh(
    new THREE.CylinderGeometry(48 + i * 5, 52 + i * 5, WALL + 2, 24, 1, false, Math.PI * 0.3, Math.PI * 0.4),
    i % 2 === 0 ? dark : red
  );
  tp.position.set(0, -72 - i * 11, 16);
  helmet.add(tp);
}

helmet.position.y = 15;
scene.add(helmet);

// Lighting
scene.add(new THREE.AmbientLight(0x303040, 0.5));
const k = new THREE.DirectionalLight(0xffeedd, 1); k.position.set(200, 300, 250); scene.add(k);
const f = new THREE.DirectionalLight(0x8899cc, 0.5); f.position.set(-200, 100, -150); scene.add(f);
const r2 = new THREE.DirectionalLight(0xffaa77, 0.6); r2.position.set(0, -80, -200); scene.add(r2);

// Camera
camera.position.set(0, 80, 350);
camera.lookAt(0, 10, 0);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 10, 0);
controls.minDistance = 150;
controls.maxDistance = 600;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;

// STL Export
window.exportSTL = function() {
  const exporter = new STLExporter();
  const blob = new Blob([exporter.parse(helmet, { binary: true })], { type: 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'samurai_helmet.stl';
  a.click();
};

// Animate
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
